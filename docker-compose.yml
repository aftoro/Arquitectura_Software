services:
  django:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: barberia_django
    volumes:
      - ./:/app
    expose:
      - "8000"
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

  flask_service:
    build:
      context: ./flask_service
      dockerfile: Dockerfile
    container_name: barberia_flask
    expose:
      - "5000"

  nginx:
    image: nginx:1.27-alpine
    container_name: barberia_nginx
    depends_on:
      - django
      - flask_service
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
